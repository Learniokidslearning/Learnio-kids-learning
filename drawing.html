<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Drawing Board - Learniokidslearning</title>
<link rel="stylesheet" href="style.css">
<style>
    .drawing-container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 30px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        border-radius: 25px;
        text-align: center;
    }

    .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-bottom: 20px;
    }

    canvas {
        background: white;
        border: 4px solid #ffffff;
        border-radius: 20px;
        cursor: crosshair;
        max-width: 100%;
        touch-action: none;
    }

    input[type="color"],
    input[type="range"] {
        padding: 5px;
    }
</style>
</head>
<body>

<div class="drawing-container">
    <h1>🎨 Kids Drawing Board</h1>
    <p>Create your own colorful artwork!</p>

    <div class="toolbar">
        <label>🎨 Color:
            <input type="color" id="colorPicker" value="#ff0000">
        </label>

        <label>🖌️ Brush Size:
            <input type="range" id="brushSize" min="1" max="20" value="5">
        </label>

        <button onclick="clearCanvas()">🧹 Clear</button>
        <button onclick="downloadDrawing()">💾 Download</button>
        <a href="index.html" class="btn">🏠 Back Home</a>
    </div>

    <canvas id="drawingCanvas" width="900" height="500"></canvas>
</div>

<script>
const canvas = document.getElementById("drawingCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;

function getPosition(e) {
    const rect = canvas.getBoundingClientRect();

    if (e.touches) {
        return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    }

    return {
        x: e.offsetX,
        y: e.offsetY
    };
}

function startDrawing(e) {
    drawing = true;
    const pos = getPosition(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
    if (!drawing) return;

    const pos = getPosition(e);

    ctx.lineWidth = document.getElementById("brushSize").value;
    ctx.lineCap = "round";
    ctx.strokeStyle = document.getElementById("colorPicker").value;

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}

function stopDrawing() {
    drawing = false;
    ctx.beginPath();
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function downloadDrawing() {
    const link = document.createElement("a");
    link.download = "my-drawing.png";
    link.href = canvas.toDataURL();
    link.click();
}

/* Mouse Events */
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseleave", stopDrawing);

/* Touch Events */
canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    startDrawing(e);
});

canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    draw(e);
});

canvas.addEventListener("touchend", stopDrawing);
</script>

</body>
</html>
